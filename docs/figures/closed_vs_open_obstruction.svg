<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420"><rect width="1100" height="420" fill="#0b1020"/><text x="330" y="55" fill="#fff" font-size="32" font-family="Arial" font-weight="bold">AXZ Closure vs Obstruction</text><rect x="70" y="100" width="440" height="250" rx="18" fill="#12351e" stroke="#57ff8a" stroke-width="3"/><rect x="590" y="100" width="440" height="250" rx="18" fill="#3a1420" stroke="#ff5d7a" stroke-width="3"/><g fill="#fff" font-family="Arial"><text x="180" y="155" font-size="30" font-weight="bold">Closed Audit</text><text x="120" y="215" font-size="22">dim H_R = 0</text><text x="120" y="250" font-size="22">dim H_G = 0</text><text x="120" y="300" font-size="22">No unexplained defects.</text><text x="690" y="155" font-size="30" font-weight="bold">Open Obstruction</text><text x="640" y="215" font-size="22">dim H_R > 0 or dim H_G > 0</text><text x="640" y="270" font-size="22">Surviving classes identify</text><text x="640" y="305" font-size="22">missing proof obligations.</text></g></svg>